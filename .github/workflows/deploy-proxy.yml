name: Deploy Vercel Proxy

# Auto-deploy do proxy CurseForge quando houver mudança em vercel-proxy/**.
# Configurar 3 secrets no GitHub (Settings → Secrets and variables → Actions):
#   - VERCEL_TOKEN:   token pessoal (https://vercel.com/account/tokens)
#   - VERCEL_ORG_ID:  team ID ou user ID do Vercel
#   - VERCEL_PROJECT_ID: ID do projeto (Settings → General → Project ID)

on:
  push:
    branches: [main]
    paths:
      - 'vercel-proxy/**'
      - '.github/workflows/deploy-proxy.yml'

  workflow_dispatch:
    # Permite deploy manual via aba "Run workflow" no GitHub

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vercel-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --no-save vercel@latest

      - name: Pull Vercel project info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
